<!doctype html>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Content-Security-Policy (ADR-093 §S4 / Step 22d).

      script-src 'self' 'wasm-unsafe-eval': allows the ruvector
        ONNX-WASM modules to instantiate (browsers require this token
        for `WebAssembly.compile`/`instantiate`). No 'unsafe-eval'
        and no 'unsafe-inline' — inline event handlers are blocked.
        'unsafe-inline' on style-src is necessary for Vite's HMR-
        injected style tags + the chart.tsx CSS-variable injection.
      connect-src: only this origin + the LOCAL_FN/GCF function
        host (resolved at deploy time via VITE_FUNCTIONS_BASE_URL)
        + HuggingFace (the ruvector embedder fetches model bytes
        + tokenizer at runtime). Add specific upstream LLM hosts
        only if Path B (direct Anthropic) ever lands.
      object-src 'none', base-uri 'self', frame-ancestors 'self':
        defense in depth against legacy plugin abuse, base-tag
        injection, and clickjacking.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self' data:;
      connect-src 'self' http://localhost:8080 http://localhost:8787 https://goal.ruv.io https://huggingface.co https://*.huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
    " />
    <!--
      `frame-ancestors` is intentionally NOT in the <meta> CSP — browsers
      ignore it there (must come via HTTP header). The deploy host
      (netlify.toml / GCF Cloud Run config) MUST set:
        X-Frame-Options: SAMEORIGIN
        Content-Security-Policy: frame-ancestors 'self';
      Step 23 / branding pass adds the netlify.toml header config.
    -->
